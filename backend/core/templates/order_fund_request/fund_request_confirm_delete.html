{% extends "base.html" %}

{% block content %}
  <section class="card" style="max-width: 620px;">
    <h2 style="margin-top: 0;">Delete fund request</h2>
    <p>Delete {{ object.formatted_fund_request_number|default:"this draft fund request" }}?</p>
    <form method="post" data-confirm-message="Delete this fund request?">
      {% csrf_token %}
      <button class="btn btn-danger" type="submit">Delete</button>
      <a class="btn" href="{% url 'ui:fund-request-list' %}">Cancel</a>
    </form>
  </section>
{% endblock %}
